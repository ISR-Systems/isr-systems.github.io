<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISR Systems — Dome Defense for Critical Infrastructure</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(200, 230, 74, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(200, 230, 74, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(30deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(30deg) translateY(60px); }
        }

        .dome {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            border-radius: 50%;
            border: 1px solid rgba(200, 230, 74, 0.08);
            box-shadow:
                0 0 120px rgba(200, 230, 74, 0.03),
                inset 0 0 120px rgba(200, 230, 74, 0.02);
        }

        .dome-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            border: 1px solid rgba(200, 230, 74, 0.05);
        }

        .dome-ring:nth-child(1) {
            width: 400px;
            height: 400px;
            transform: translate(-50%, -50%);
            animation: pulse 4s ease-in-out infinite;
        }

        .dome-ring:nth-child(2) {
            width: 500px;
            height: 500px;
            transform: translate(-50%, -50%);
            animation: pulse 4s ease-in-out infinite 1s;
        }

        .dome-ring:nth-child(3) {
            width: 700px;
            height: 700px;
            transform: translate(-50%, -50%);
            animation: pulse 4s ease-in-out infinite 2s;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.02); }
        }

        .node {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #C8E64A;
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(200, 230, 74, 0.6);
        }

        .node::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1px solid rgba(200, 230, 74, 0.3);
            animation: nodePulse 3s ease-in-out infinite;
        }

        @keyframes nodePulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
        }

        .node:nth-child(4) { top: 35%; left: 30%; animation-delay: 0s; }
        .node:nth-child(5) { top: 25%; left: 55%; animation-delay: 0.5s; }
        .node:nth-child(6) { top: 45%; left: 70%; animation-delay: 1s; }
        .node:nth-child(7) { top: 60%; left: 40%; animation-delay: 1.5s; }
        .node:nth-child(8) { top: 55%; left: 60%; animation-delay: 2s; }
        .node:nth-child(9) { top: 40%; left: 45%; animation-delay: 0.3s; }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            text-align: center;
        }

        .logo-text {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #C8E64A;
            margin-bottom: 60px;
        }

        h1 {
            font-size: clamp(36px, 6vw, 72px);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 24px;
            max-width: 800px;
        }

        h1 span {
            color: #C8E64A;
        }

        .tagline {
            font-size: clamp(16px, 2vw, 20px);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            max-width: 560px;
            line-height: 1.6;
            margin-bottom: 60px;
        }

        .coming-soon {
            display: inline-block;
            padding: 14px 40px;
            border: 1px solid rgba(200, 230, 74, 0.4);
            color: #C8E64A;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 80px;
        }

        .contact {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
        }

        .contact a {
            color: rgba(200, 230, 74, 0.7);
            text-decoration: none;
        }

        .contact a:hover {
            color: #C8E64A;
        }

        .footer-line {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200, 230, 74, 0.3), transparent);
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="grid"></div>
        <div class="dome">
            <div class="dome-ring"></div>
            <div class="dome-ring"></div>
            <div class="dome-ring"></div>
            <div class="node"></div>
            <div class="node"></div>
            <div class="node"></div>
            <div class="node"></div>
            <div class="node"></div>
            <div class="node"></div>
        </div>
    </div>

    <div class="content">
        <div class="logo-text">ISR Systems</div>
        <h1>Dome defense for <span>critical infrastructure</span></h1>
        <p class="tagline">Replacing expensive legacy hardware with dense networks of low-cost sensors. Deep fusion software creates a scalable defense dome, bringing military-grade security to commercial critical infrastructure.</p>
        <div class="coming-soon">Coming Soon</div>
        <div class="contact">
            <a href="mailto:lucas@isrsystems.com">lucas@isrsystems.com</a>
        </div>
    </div>

    <div class="footer-line"></div>
</body>
</html>
